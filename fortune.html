<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 운세</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #05000e;
    --card-back: #120820;
    --card-front-bg: #0d0520;
    --gold: #c9a227;
    --gold-light: #f0cb5a;
    --purple: #7b2fff;
    --purple-light: #b57aff;
    --ice: #4fc3f7;
    --text: #e8d5ff;
    --text-dim: #9b7ec8;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    overflow-x: hidden;
  }

  /* ── 별빛 배경 ── */
  .stars-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(1); }
    50%       { opacity: var(--max-op, 0.8); transform: scale(1.3); }
  }
  .nebula {
    position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0; opacity: 0.12;
  }
  .nebula-1 { width: 600px; height: 600px; background: #4a00a0; top: -150px; left: -100px; }
  .nebula-2 { width: 500px; height: 500px; background: #00306e; bottom: -100px; right: -80px; }

  /* ── 레이아웃 ── */
  .container {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
    gap: 40px;
  }

  /* ── 타이틀 ── */
  .title-area { text-align: center; }
  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--purple-light), var(--ice));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.15em;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(201,162,39,0.4));
  }
  .subtitle {
    margin-top: 10px;
    font-size: 0.95rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .divider {
    margin: 14px auto 0;
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── 카드 영역 ── */
  .card-scene {
    perspective: 900px;
    width: 220px; height: 340px;
  }
  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: default;
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* 뒷면 */
  .card-back {
    background: var(--card-back);
    border: 1px solid rgba(123, 47, 255, 0.35);
    box-shadow: 0 0 40px rgba(123,47,255,0.2), inset 0 0 60px rgba(0,0,0,0.5);
  }
  .card-back::before {
    content: '';
    position: absolute; inset: 12px;
    border: 1px solid rgba(201,162,39,0.2);
    border-radius: 10px;
  }
  .card-back-symbol {
    font-size: 4rem;
    opacity: 0.18;
    user-select: none;
    animation: slowSpin 20s linear infinite;
  }
  @keyframes slowSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .card-back-ornament {
    position: absolute;
    font-size: 1.1rem;
    color: rgba(201,162,39,0.25);
    user-select: none;
  }
  .card-back-ornament.tl { top: 22px; left: 22px; }
  .card-back-ornament.tr { top: 22px; right: 22px; }
  .card-back-ornament.bl { bottom: 22px; left: 22px; }
  .card-back-ornament.br { bottom: 22px; right: 22px; }

  /* 앞면 */
  .card-front {
    background: var(--card-front-bg);
    border: 1px solid rgba(201,162,39,0.4);
    box-shadow: 0 0 50px rgba(201,162,39,0.15), 0 0 100px rgba(123,47,255,0.1);
    transform: rotateY(180deg);
    flex-direction: column;
    gap: 10px;
    padding: 24px 18px;
    text-align: center;
  }
  .card-front::after {
    content: '';
    position: absolute; inset: 10px;
    border: 1px solid rgba(201,162,39,0.15);
    border-radius: 10px;
    pointer-events: none;
  }
  .card-symbol {
    font-size: 4.5rem;
    line-height: 1;
    filter: drop-shadow(0 0 16px currentColor);
    animation: symbolGlow 2s ease-in-out infinite alternate;
  }
  @keyframes symbolGlow {
    from { filter: drop-shadow(0 0 8px currentColor); }
    to   { filter: drop-shadow(0 0 24px currentColor) drop-shadow(0 0 40px currentColor); }
  }
  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .card-name-kr {
    font-size: 0.82rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .card-divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 4px auto;
  }
  .card-keyword {
    font-size: 0.72rem;
    color: var(--purple-light);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── 메시지 박스 ── */
  .message-box {
    max-width: 480px; width: 100%;
    background: rgba(18, 8, 32, 0.85);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 16px;
    padding: 28px 32px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 60px rgba(123,47,255,0.1);
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: none;
  }
  .message-box.visible {
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  .message-label {
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .message-text {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text);
    font-weight: 300;
    word-break: keep-all;
  }
  .message-advice {
    margin-top: 16px;
    font-size: 0.85rem;
    color: var(--ice);
    opacity: 0.8;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* ── 버튼 ── */
  .btn-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .draw-btn {
    position: relative;
    padding: 16px 52px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--bg);
    background: linear-gradient(135deg, var(--gold), #a87d1a, var(--gold));
    background-size: 200% 200%;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 0 30px rgba(201,162,39,0.4), 0 4px 20px rgba(0,0,0,0.5);
    animation: btnPulse 3s ease-in-out infinite;
    overflow: hidden;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(201,162,39,0.4), 0 4px 20px rgba(0,0,0,0.5); }
    50%       { box-shadow: 0 0 50px rgba(201,162,39,0.7), 0 4px 30px rgba(0,0,0,0.5); }
  }
  .draw-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .draw-btn:hover:not(:disabled)::after { transform: translateX(100%); }
  .draw-btn:hover:not(:disabled) { transform: translateY(-2px); animation-play-state: paused; box-shadow: 0 0 60px rgba(201,162,39,0.8), 0 8px 30px rgba(0,0,0,0.6); }
  .draw-btn:active:not(:disabled) { transform: translateY(0); }
  .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; animation: none; }

  .retry-hint {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .retry-hint.visible { opacity: 1; }

  /* ── 하단 문구 ── */
  .footer-text {
    position: fixed; bottom: 20px; left: 0; right: 0;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(155, 126, 200, 0.3);
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  /* ── 별자리 장식 ── */
  .constellation {
    position: fixed; pointer-events: none; z-index: 0;
    opacity: 0.07;
  }
  .constellation svg line { stroke: white; stroke-width: 0.5; }
  .constellation svg circle { fill: white; }
</style>
</head>
<body>

<!-- 네뷸라 -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<!-- 별빛 레이어 -->
<div class="stars-layer" id="starsLayer"></div>

<!-- 별자리 장식 (배경용) -->
<div class="constellation" style="top:0;left:0;width:100%;height:100%;">
  <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <line x1="10%" y1="15%" x2="25%" y2="8%" />
    <line x1="25%" y1="8%" x2="40%" y2="20%" />
    <line x1="40%" y1="20%" x2="55%" y2="12%" />
    <circle cx="10%" cy="15%" r="2"/><circle cx="25%" cy="8%" r="2.5"/>
    <circle cx="40%" cy="20%" r="1.5"/><circle cx="55%" cy="12%" r="2"/>
    <line x1="70%" y1="80%" x2="85%" y2="72%" />
    <line x1="85%" y1="72%" x2="95%" y2="85%" />
    <circle cx="70%" cy="80%" r="2"/><circle cx="85%" cy="72%" r="3"/>
    <circle cx="95%" cy="85%" r="1.5"/>
    <line x1="5%" y1="60%" x2="15%" y2="50%" />
    <line x1="15%" y1="50%" x2="8%" y2="40%" />
    <circle cx="5%" cy="60%" r="1.5"/><circle cx="15%" cy="50%" r="2"/>
    <circle cx="8%" cy="40%" r="1.5"/>
  </svg>
</div>

<div class="container">
  <!-- 타이틀 -->
  <div class="title-area">
    <div class="title">✦ 오늘의 운세 ✦</div>
    <div class="subtitle">별이 전하는 오늘 하루의 메시지</div>
    <div class="divider"></div>
  </div>

  <!-- 카드 -->
  <div class="card-scene">
    <div class="card" id="card">
      <!-- 뒷면 -->
      <div class="card-face card-back">
        <span class="card-back-ornament tl">✦</span>
        <span class="card-back-ornament tr">✦</span>
        <span class="card-back-ornament bl">✦</span>
        <span class="card-back-ornament br">✦</span>
        <span class="card-back-symbol">☽</span>
      </div>
      <!-- 앞면 -->
      <div class="card-face card-front" id="cardFront">
        <div class="card-symbol" id="cardSymbol">☀</div>
        <div class="card-name" id="cardName">THE SUN</div>
        <div class="card-name-kr" id="cardNameKr">태양</div>
        <div class="card-divider"></div>
        <div class="card-keyword" id="cardKeyword">Light · Success</div>
      </div>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="btn-area">
    <button class="draw-btn" id="drawBtn" onclick="drawFortune()">✦ 운세 뽑기 ✦</button>
    <span class="retry-hint" id="retryHint">다시 뽑으려면 버튼을 누르세요</span>
  </div>

  <!-- 메시지 박스 -->
  <div class="message-box" id="messageBox">
    <div class="message-label">✦ 오늘의 메시지 ✦</div>
    <p class="message-text" id="messageText"></p>
    <p class="message-advice" id="messageAdvice"></p>
  </div>
</div>

<div class="footer-text">✦ &nbsp; 우주의 에너지가 당신과 함께합니다 &nbsp; ✦</div>

<script>
  /* ── 카드 데이터 ── */
  const CARDS = [
    {
      symbol: '☀', symbolColor: '#f0cb5a',
      name: 'THE SUN', nameKr: '태양',
      keyword: 'Light · Success · Vitality',
      message: '오늘은 찬란한 빛이 당신의 길을 환히 비춥니다. 오랫동안 감추어두었던 재능이 드디어 세상 앞에 빛을 발할 날이 가까웠습니다. 자신감을 가지고 당당하게 나아가세요.',
      advice: '노란색을 가까이하면 행운이 배가됩니다.'
    },
    {
      symbol: '☽', symbolColor: '#b57aff',
      name: 'THE MOON', nameKr: '달',
      keyword: 'Intuition · Mystery · Dream',
      message: '오늘은 논리보다 직관을 믿어야 할 때입니다. 겉으로 보이는 것 너머에 진실이 숨어 있습니다. 오늘 밤 꿈 속에 당신에게 전할 중요한 메시지가 깃들어 있을지도 모릅니다.',
      advice: '서두르지 마세요. 달은 차고 기울며 때를 기다립니다.'
    },
    {
      symbol: '★', symbolColor: '#4fc3f7',
      name: 'THE STAR', nameKr: '별',
      keyword: 'Hope · Wish · Guidance',
      message: '오래 바라왔던 소원이 이루어질 조짐이 보입니다. 포기하지 않고 걸어온 당신의 발걸음 하나하나가 지금 이 순간 빛나는 별이 되어 하늘에 새겨지고 있습니다.',
      advice: '오늘 밤 별을 보며 소원을 빌어보세요.'
    },
    {
      symbol: '⟡', symbolColor: '#ff6b6b',
      name: 'THE DRAGON', nameKr: '용',
      keyword: 'Power · Courage · Change',
      message: '잠자고 있던 내면의 힘이 깨어나는 날입니다. 두려움은 성장의 또 다른 이름입니다. 오늘만큼은 망설임을 내던지고 용처럼 힘차게 도전하세요. 강한 에너지가 당신 곁에 있습니다.',
      advice: '붉은 색이 오늘의 당신에게 힘을 불어넣어 줍니다.'
    },
    {
      symbol: '✿', symbolColor: '#ff9bd2',
      name: 'THE LOTUS', nameKr: '연꽃',
      keyword: 'Purity · Rebirth · Bloom',
      message: '깊고 어두운 물 속에서도 피어나는 연꽃처럼, 어떠한 환경도 당신의 아름다움을 막지 못합니다. 지금의 어려움이 곧 당신을 더욱 찬란하게 피워낼 밑거름이 됩니다.',
      advice: '깨끗한 물 한 잔을 마시며 새로운 시작을 다짐하세요.'
    },
    {
      symbol: '❋', symbolColor: '#a8edea',
      name: 'THE BUTTERFLY', nameKr: '나비',
      keyword: 'Transform · Freedom · Beauty',
      message: '번데기를 벗어던진 나비처럼, 오늘 당신은 새로운 자신과 마주합니다. 변화는 아름다운 것입니다. 익숙한 것을 내려놓을수록 더 넓은 하늘이 당신 앞에 펼쳐집니다.',
      advice: '낯선 길을 선택하는 용기가 오늘의 행운을 만듭니다.'
    },
    {
      symbol: '⚷', symbolColor: '#c9a227',
      name: 'THE KEY', nameKr: '열쇠',
      keyword: 'Opportunity · Secret · Discovery',
      message: '오늘 중요한 기회의 문이 당신 앞에 열립니다. 두드리기를 망설이지 마세요. 오랫동안 찾아 헤맸던 답, 또는 잃어버렸다고 생각했던 소중한 무언가를 되찾게 될 것입니다.',
      advice: '처음 만나는 사람이 열쇠를 쥐고 있을 수 있습니다.'
    },
    {
      symbol: '⧗', symbolColor: '#9b59b6',
      name: 'THE HOURGLASS', nameKr: '모래시계',
      keyword: 'Patience · Time · Wisdom',
      message: '지금은 인내의 시간입니다. 흘러가는 모래알처럼 조급함을 조용히 내려놓으세요. 모든 것에는 완벽한 때가 있으며, 그 순간은 당신이 생각하는 것보다 훨씬 가까이 있습니다.',
      advice: '서두르지 않는 것이 오늘 가장 현명한 선택입니다.'
    },
  ];

  let isAnimating = false;
  let hasDrawn = false;

  function drawFortune() {
    if (isAnimating) return;
    isAnimating = true;

    const btn = document.getElementById('drawBtn');
    const card = document.getElementById('card');
    const messageBox = document.getElementById('messageBox');
    const retryHint = document.getElementById('retryHint');

    btn.disabled = true;
    messageBox.classList.remove('visible');

    const picked = CARDS[Math.floor(Math.random() * CARDS.length)];

    // 이미 뒤집혔다면 잠깐 되돌린 후 다시 뒤집기
    if (hasDrawn) {
      card.classList.remove('flipped');
      setTimeout(() => flipCard(picked), 500);
    } else {
      setTimeout(() => flipCard(picked), 200);
    }

    function flipCard(c) {
      // 앞면 데이터 주입
      const sym = document.getElementById('cardSymbol');
      sym.textContent = c.symbol;
      sym.style.color = c.symbolColor;
      document.getElementById('cardName').textContent = c.name;
      document.getElementById('cardNameKr').textContent = c.nameKr;
      document.getElementById('cardKeyword').textContent = c.keyword;
      document.getElementById('messageText').textContent = c.message;
      document.getElementById('messageAdvice').textContent = '✦ ' + c.advice;

      card.classList.add('flipped');

      setTimeout(() => {
        messageBox.classList.add('visible');
        btn.disabled = false;
        btn.textContent = '✦ 다시 뽑기 ✦';
        retryHint.classList.add('visible');
        isAnimating = false;
        hasDrawn = true;
      }, 900);
    }
  }

  /* ── 별빛 생성 ── */
  (function createStars() {
    const layer = document.getElementById('starsLayer');
    const count = 120;
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      star.style.cssText = [
        `width:${size}px`, `height:${size}px`,
        `top:${Math.random()*100}%`, `left:${Math.random()*100}%`,
        `--dur:${(Math.random()*4+2).toFixed(1)}s`,
        `--delay:${(Math.random()*5).toFixed(1)}s`,
        `--max-op:${(Math.random()*0.6+0.3).toFixed(2)}`,
      ].join(';');
      layer.appendChild(star);
    }
  })();
</script>
</body>
</html>
