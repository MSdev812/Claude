<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-sm">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">카운터</h1>

        <!-- 카운트 숫자 표시 -->
        <div class="mb-8">
            <div class="bg-blue-50 rounded-lg p-8 border-2 border-blue-200">
                <p class="text-center text-gray-600 text-sm mb-2">현재 카운트</p>
                <p id="count" class="text-6xl font-bold text-center text-blue-600">0</p>
            </div>
        </div>

        <!-- 버튼 그룹 -->
        <div class="grid grid-cols-3 gap-4 mb-4">
            <!-- 감소 버튼 -->
            <button
                onclick="decrementCount()"
                class="bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 active:scale-95"
            >
                -1
            </button>

            <!-- 리셋 버튼 -->
            <button
                onclick="resetCount()"
                class="bg-blue-400 hover:bg-blue-500 active:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 active:scale-95"
            >
                리셋
            </button>

            <!-- 증가 버튼 -->
            <button
                onclick="incrementCount()"
                class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 active:scale-95"
            >
                +1
            </button>
        </div>

        <!-- 정보 텍스트 -->
        <p class="text-center text-gray-500 text-xs mt-6">버튼을 클릭하여 카운트를 조정하세요</p>
    </div>

    <script>
        // 카운트 초기값 (localStorage에서 불러오면 이전 값 유지)
        let count = localStorage.getItem('counter') ? parseInt(localStorage.getItem('counter')) : 0;

        // 초기 렌더링
        updateDisplay();

        // 카운트 증가
        function incrementCount() {
            count++;
            updateDisplay();
        }

        // 카운트 감소
        function decrementCount() {
            count--;
            updateDisplay();
        }

        // 카운트 리셋
        function resetCount() {
            count = 0;
            updateDisplay();
        }

        // 화면 업데이트 및 저장
        function updateDisplay() {
            document.getElementById('count').textContent = count;
            // localStorage에 저장하여 새로고침 후에도 값 유지
            localStorage.setItem('counter', count);
        }
    </script>
</body>
</html>
